# Calibration datasets for Qwen3.5-122B-A10B.

[calibration]
method = "quantile"
quantiles = [0.99, 0.999, 0.9999, 0.99999]

[[dataset]]
path = "text/agentic_coding_calib_v3.jsonl"
max_len = 1024
limit = 4096

[[dataset]]
path = "multimodal/vqa_calib.jsonl"
max_len = 2048
multimodal = true

[[dataset]]
path = "text/diverse_calib.jsonl"
max_len = 1024
limit = 4096

[[dataset]]
path = "text/deep_calib.jsonl"
max_len = 8192
